                        <div key={i} className="text-sm border border-gray-200 rounded px-3 py-1 bg-gray-50 flex items-center">
                          <span className="mr-2 text-gray-400 font-bold">{i + 1}.</span> {parseFurigana(choice)}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <div className="absolute bottom-2 right-2 text-[10px] text-gray-300">
                  Ans: {data.q.ans}
                </div>
              </div>
            </div>
          </div>
        );

        // === 主程式 ===
        function App() {
          return (
            <div className="min-h-screen py-8 flex flex-col items-center">
              {/* 懸浮列印按鈕 */}
              <button 
                onClick={() => window.print()} 
                className="fixed top-6 right-6 bg-emerald-600 text-white px-6 py-3 rounded-full shadow-xl hover:bg-emerald-700 transition-colors font-bold text-lg flex items-center gap-2 z-50 no-print"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                列印 / 輸出 PDF
              </button>

              <div className="mb-6 text-gray-500 font-bold no-print text-center">
                — 往下滑動預覽所有頁面，點擊右上角按鈕即可列印 —<br/>
                <span className="text-sm font-normal">（如遇到中文亂碼，請確認您的檔案已經儲存為 UTF-8 編碼）</span>
              </div>
              
              {/* 封面 */}
              <CoverPage />

              {/* 20 頁內容 */}
              {pageData.map(data => (
                <ContentPage key={`page-${data.p}`} data={data} />
              ))}
            </div>
          );
        }

        // === 渲染至 DOM ===
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
